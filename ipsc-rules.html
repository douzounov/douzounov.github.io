                    { rule: "10.5.9", condition: "Finger inside trigger guard while clearing malfunction away from targets", action: "Disqualification" },
                    { rule: "10.5.10", condition: "Finger inside trigger guard during loading, reloading, unloading", action: "Disqualification (exceptions: specifically permitted per Rules 8.1.2.5, 8.3.7.1, 8.7.1)" },
                    { rule: "10.5.11", condition: "Finger inside trigger guard during movement", action: "Disqualification (per Rule 8.5.1)" },
                    { rule: "10.5.12", condition: "Loaded and holstered handgun in unsafe condition", action: "Disqualification" },
                    { rule: "10.5.13", condition: "Handling live or dummy ammunition in Safety Area", action: "Disqualification (exception: ammunition in magazines/speed loaders on belt/pockets/bag may be carried but not removed from storage). See also Rule 2.4.4." },
                    { rule: "10.5.14", condition: "Having loaded firearm when not authorized by Range Officer", action: "Disqualification" },
                    { rule: "10.5.15", condition: "Retrieving dropped firearm", action: "Disqualification (RO must retrieve and place in gun case/bag/holster)" },
                    { rule: "10.5.16", condition: "Using prohibited/unsafe ammunition or prohibited firearm", action: "Disqualification (see Rules 5.5.4, 5.5.5, 5.5.6, 5.1.10, 5.1.11)" },
                    { rule: "10.6.1", condition: "Unsportsmanlike conduct including cheating, dishonesty, failing to comply with Match Official directions", action: "Disqualification; Range Master notified immediately" },
                    { rule: "10.6.2", condition: "Intentionally removing/causing loss of eye or ear protection for reshoot/advantage", action: "Disqualification" },
                    { rule: "10.7.3", condition: "Visibly under influence of drugs (including alcohol) except for medicinal purposes", action: "Disqualification from match; may be required to leave range" }
                ]
            },
            reshoots: {
                title: "Reshoots",
                description: "Rules for when reshoots are granted or denied.",
                type: "reshoots",
                rows: [
                    { rule: "2.3.3.3", condition: "[REFUSED] Competitor refuses ordered reshoot", action: "Zero score for that stage, regardless of previous attempt score" },
                    { rule: "4.7.2", condition: "[GRANTED] Range equipment failure OR metal/moving target not reset before attempt", action: "Competitor must be required to reshoot after corrective actions" },
                    { rule: "4.7.2.1", condition: "[DENIED] Unrestored paper targets", action: "NOT considered range equipment failure (no reshoot). See also Rule 9.1.4." },
                    { rule: "4.7.2.2", condition: "[GRANTED] Target(s) faulty or presented significantly differently than earlier presentations", action: "Range Master may offer reshoot to affected competitor(s)" },
                    { rule: "5.4.3", condition: "[GRANTED] Eye or ear protection lost/displaced OR course started without them", action: "Competitor must be required to reshoot after protective devices restored" },
                    { rule: "5.7.5", condition: "[DENIED] Firearm has failed (unserviceable or unsafe declared during course)", action: "Competitor must NOT be permitted to reshoot the course. See also Rule 5.1.6." },
                    { rule: "5.7.6.2", condition: "[GRANTED] Range Officer discovers suspected safety problem does not exist", action: "Competitor will be required to reshoot the stage" },
                    { rule: "5.7.6.3", condition: "[DENIED] Competitor self-stops due to suspected or actual squib load", action: "Competitor is NOT entitled to a reshoot" },
                    { rule: "5.8.1.2", condition: "[DENIED] Ammunition malfunction (official match ammunition)", action: "Malfunctions will NOT be grounds for reshoot and/or appeal to Arbitration" },
                    { rule: "8.6.1", condition: "[DENIED] Range Officer issues safety warnings to competitor during course", action: "Safety warnings will NOT be grounds for reshoot (warnings are permitted assistance)" },
                    { rule: "8.6.3", condition: "[GRANTED] Person verbally or otherwise interfering significantly affects competitor", action: "Range Master may offer reshoot at their discretion" },
                    { rule: "8.6.4", condition: "[GRANTED] Range Officer or other external influence inadvertently interferes with competitor", action: "Range Officer may offer competitor a reshoot" },
                    { rule: "8.6.5", condition: "[GRANTED] Person appears downrange during course of fire", action: "Competitor must immediately cease firing and be required to reshoot" },
                    { rule: "9.1.3", condition: "[GRANTED] Target prematurely patched/taped, preventing accurate score determination", action: "Range Officer must order competitor to reshoot" },
                    { rule: "9.1.4.2", condition: "[DENIED] Competitor hesitates/self-stops believing targets not restored/reset", action: "Competitor is NOT entitled to a reshoot" },
                    { rule: "9.7.6", condition: "[DENIED] Reshoot not possible for any reason", action: "Apply specific remedies: missing time = zero score; recorded hits/misses/penalties = deemed conclusive; missing competitor ID = Range Master determines action. See also Rule 8.6.2." },
                    { rule: "9.10.2", condition: "[GRANTED] Arbitration Committee deems time credited to competitor unrealistic", action: "Competitor will be required to reshoot. See also Rule 9.7.4." }
                ]
            },
            scoring: {
                title: "Scoring",
                description: "Rules for target scoring, hit evaluation, and handling of damaged or impenetrable targets.",
                type: "scoring",
                rows: [
                    { rule: "9.1.1", condition: "Approaching targets closer than 1 meter during scoring without Range Officer authorization", action: "Warning for first offense; subsequent violations may incur procedural penalty at Range Officer discretion" },
                    { rule: "9.1.2", condition: "Touching, gauging, or interfering with target during scoring without Range Officer authorization", action: "Range Officer may score affected target as missed OR impose penalties for affected no-shoots" },
                    { rule: "9.1.3", condition: "Target prematurely patched/taped, preventing score determination", action: "Competitor must be required to reshoot the course of fire" },
                    { rule: "9.1.4", condition: "Targets not properly patched/taped for scoring, with extra scoring or questionable penalty hits", action: "Range Officer must judge if accurate score possible; if not, competitor must reshoot" },
                    { rule: "9.1.4.1", condition: "Patches/tape on restored target blown off by wind or muzzle blast with ambiguous hits", action: "Competitor will be required to reshoot the course of fire" },
                    { rule: "9.1.5.1", condition: "Bullet strikes wholly through scoring area of one paper target and into another paper target", action: "Hit on subsequent paper target will NOT count for score or penalty" },
                    { rule: "9.1.5.2", condition: "Bullet strikes wholly through scoring area of paper target and strikes down a metal target", action: "Treated as range equipment failure; competitor will be required to reshoot" },
                    { rule: "9.1.5.3", condition: "Bullet strikes partially within scoring area of one target and continues to another paper target", action: "Hit on subsequent paper target WILL count for score or penalty" },
                    { rule: "9.1.5.4", condition: "Bullet strikes partially within scoring area and strikes down another metal target", action: "Fallen metal target WILL count for score or penalty" },
                    { rule: "9.1.6.1", condition: "Bullet strikes wholly through hard cover and continues to paper target or no-shoot", action: "Hit on paper target or no-shoot will NOT count; if unclear, ignore highest scoring hits" },
                    { rule: "9.1.6.2", condition: "Bullet strikes wholly through hard cover and strikes down a metal target", action: "Treated as range equipment failure; competitor will be required to reshoot. See also Rule 4.7.1." },
                    { rule: "9.1.6.3", condition: "Bullet strikes partially through hard cover and continues to paper target", action: "Hit on paper target WILL count for score or penalty" },
                    { rule: "9.1.6.4", condition: "Bullet strikes partially through hard cover and strikes down metal target/no-shoot", action: "Fallen/hit metal target/no-shoot WILL count for score or penalty" },
                    { rule: "9.1.7", condition: "Shots pass through target sticks and hit paper or metal targets", action: "Hits on paper or metal targets WILL count for score or penalty (target sticks not cover)" },
                    { rule: "9.4.2", condition: "Visible hits on scoring area of paper no-shoot", action: "Penalized minus 10 points per hit, maximum 2 hits per no-shoot" }
                ]
            }
        };

        // Initialize
        let currentFilter = 'all';
        let searchTerm = '';

        const searchInput = document.getElementById('searchInput');
        const filterButtons = document.querySelectorAll('.filter-btn');
        const sectionsContainer = document.getElementById('sectionsContainer');
        const statsContainer = document.getElementById('statsContainer');
         const modal = document.getElementById('ruleModal');
         const modalCloseBtn = document.getElementById('modalCloseBtn');
         const clearBtn = document.getElementById('clearBtn');

         // Event listeners
         searchInput.addEventListener('input', (e) => {
             searchTerm = e.target.value.toLowerCase();
             render();
         });

         clearBtn.addEventListener('click', () => {
             searchInput.value = '';
             searchTerm = '';
             render();
             searchInput.focus();
         });

         filterButtons.forEach(btn => {
             btn.addEventListener('click', () => {
                 filterButtons.forEach(b => b.classList.remove('active'));
                 btn.classList.add('active');
                 currentFilter = btn.dataset.filter;
                 render();
                 updateFilterButtonCounts();
             });
         });

         // Initialize filter button counts on page load
         updateFilterButtonCounts();

        modalCloseBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        // Keyboard escape to close modal
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                closeModal();
            }
        });

        // Render functions
        function render() {
            const visibleSections = getVisibleSections();
            renderStats(visibleSections);
            renderSections(visibleSections);
        }

        function getVisibleSections() {
            let sections = Object.values(rulesData);
            
            if (currentFilter !== 'all') {
                sections = sections.filter(s => s.type === currentFilter);
            }

            if (searchTerm) {
                sections = sections.map(section => ({
                    ...section,
                    rows: section.rows.filter(row => 
                        row.rule.toLowerCase().includes(searchTerm) ||
                        row.condition.toLowerCase().includes(searchTerm) ||
                        row.action.toLowerCase().includes(searchTerm)
                    )
                })).filter(s => s.rows.length > 0);
            }

            return sections;
        }

        function renderStats(visibleSections) {
            const totalRules = visibleSections.reduce((sum, s) => sum + s.rows.length, 0);

            let html = `
                <div class="stat-card">
                    <div class="stat-number">${totalRules}</div>
                    <div class="stat-label">Rules</div>
                </div>
            `;

            statsContainer.innerHTML = html;
        }

        function renderSections(visibleSections) {
            if (visibleSections.length === 0) {
                sectionsContainer.innerHTML = `
                    <div class="no-results">
                        <p>No rules found matching your search.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            visibleSections.forEach((section, idx) => {
                html += renderSection(section, idx, searchTerm);
            });

            sectionsContainer.innerHTML = html;

            // Add event listeners to section headers
            document.querySelectorAll('.section-header').forEach(header => {
                header.addEventListener('click', function() {
                    this.closest('.section').classList.toggle('collapsed');
                });
            });

            // Add event listeners to rule numbers
            document.querySelectorAll('.rule-number').forEach(ruleBtn => {
                ruleBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const ruleNum = ruleBtn.textContent.trim();
                    openModal(ruleNum);
                });
            });

            // Add event listeners to inline rule numbers in action column
            document.querySelectorAll('.rule-number-inline').forEach(ruleBtn => {
                ruleBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const ruleNum = ruleBtn.textContent.trim();
                    openModal(ruleNum);
                });
            });
        }

        function renderSection(section, idx, hasSearch) {
            const headerClass = (hasSearch || currentFilter !== 'all') ? '' : 'collapsed';
            let html = `
                <div class="section ${headerClass}">
                    <div class="section-header">
                        <span style="flex: 1; min-width: 0; overflow-wrap: break-word;">${section.title}</span>
                        <span class="toggle-icon">▶</span>
                    </div>
                    <div class="section-content">
                        <div class="section-description">${section.description}</div>
                        <table>
                            <thead>
                                <tr>
                                    <th style="width: 20%; min-width: 50px;">Rule</th>
                                    <th style="width: 40%; min-width: 100px;">Condition</th>
                                    <th style="width: 40%; min-width: 100px;">Action</th>
                                </tr>
                            </thead>
                            <tbody>
            `;

            section.rows.forEach(row => {
                html += `
                    <tr>
                        <td><span class="rule-number">${highlightSearch(row.rule)}</span></td>
                        <td>${stylizeTags(highlightSearch(row.condition))}</td>
                        <td>${makeRuleNumbersClickable(stylizeTags(highlightSearch(row.action)), true)}</td>
                    </tr>
                `;
            });

            html += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            return html;
        }

        function highlightSearch(text) {
            if (!searchTerm) return text;
            const regex = new RegExp(`(${searchTerm})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        function makeRuleNumbersClickable(text, isActionColumn = false) {
            // Only make rule numbers clickable in the Action column
            if (!isActionColumn) {
                return text;
            }
            
            // Match rule numbers like 10.6.1, 8.3.1.1, 2.3.4.1 etc. but not decimals like 1.8 or 3 meters
            // Rule numbers should have at least 3 parts separated by dots (e.g., X.Y.Z)
            // and should NOT be preceded/followed by other digits (word boundary)
            const ruleRegex = /\b(\d+\.\d+\.\d+(?:\.\d+)*)\b/g;
            return text.replace(ruleRegex, '<span class="rule-number-inline">$1</span>');
        }

        function stylizeTags(text) {
            // Replace [GRANTED] tags with styled spans (without brackets)
            text = text.replace(/\[GRANTED\]/g, '<span class="tag-granted">GRANTED</span>');
            // Replace [DENIED] tags with styled spans (without brackets)
            text = text.replace(/\[DENIED\]/g, '<span class="tag-denied">DENIED</span>');
            // Replace [REFUSED] tags with styled spans (without brackets)
            text = text.replace(/\[REFUSED\]/g, '<span class="tag-refused">REFUSED</span>');
            return text;
        }

        function openModal(ruleNum) {
            // Handle rule ranges like "10.1.1-10.1.4"
            if (ruleNum.includes('-')) {
                const parts = ruleNum.split('-');
                const startRule = parts[0].trim();
                const endRule = parts[1].trim();
                
                // Parse start and end rule numbers
                const startParts = startRule.split('.').map(Number);
                const endParts = endRule.split('.').map(Number);
                
                // Generate all rules in the range
                let rulesInRange = [];
                if (startParts.length === 3 && endParts.length === 3 &&
                    startParts[0] === endParts[0] && startParts[1] === endParts[1]) {
                    // Range like 10.1.1-10.1.4
                    const base = `${startParts[0]}.${startParts[1]}`;
                    for (let i = startParts[2]; i <= endParts[2]; i++) {
                        rulesInRange.push(`${base}.${i}`);
                    }
                }
                
                // Build modal content with all rules
                let modalContent = '';
                rulesInRange.forEach((rule, idx) => {
                    const text = fullRuleText[rule] || `Rule ${rule} - Full text not available`;
                    modalContent += text;
                    if (idx < rulesInRange.length - 1) {
                        modalContent += '\n\n---\n\n';
                    }
                });
                
                document.getElementById('modalRuleNumber').textContent = ruleNum;
                document.getElementById('modalBody').textContent = modalContent;
            } else {
                const fullText = fullRuleText[ruleNum] || `Rule ${ruleNum} - Full text not available`;
                document.getElementById('modalRuleNumber').textContent = ruleNum;
                document.getElementById('modalBody').textContent = fullText;
            }
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

         function closeModal() {
             modal.classList.remove('active');
             document.body.style.overflow = '';
         }

         function updateFilterButtonCounts() {
             const filterMap = {
                 'all': null,
                 'warnings': 'warnings',
                 'procedures': 'procedures',
                 'disqualifications': 'disqualifications',
                 'reshoots': 'reshoots',
                 'scoring': 'scoring'
             };

             filterButtons.forEach(btn => {
                 const filterType = btn.dataset.filter;
                 let count = 0;

                 if (filterType === 'all') {
                     count = Object.values(rulesData).reduce((sum, section) => sum + section.rows.length, 0);
                 } else {
                     const section = Object.values(rulesData).find(s => s.type === filterType);
                     if (section) {
                         count = section.rows.length;
                     }
                 }

                 // Get the button text without the count
                 const originalText = btn.textContent.replace(/\s*\(\d+\)$/, '');
                 btn.textContent = `${originalText} (${count})`;
             });
         }

         // Initial render
         render();
    </script>
</body>
</html>
